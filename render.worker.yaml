services:
  - type: web
    name: thm-connectx-api
    runtime: node
    plan: starter
    buildCommand: npm install && npm run build -w server
    startCommand: npm run start -w server
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: QUEUE_MODE
        value: worker
      - key: PORT
        value: 4000
      - key: CLIENT_ORIGIN
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: REDIS_URL
        sync: false
      - key: WHATSAPP_VERIFY_TOKEN
        sync: false
      - key: WHATSAPP_ACCESS_TOKEN
        sync: false
      - key: WHATSAPP_PHONE_NUMBER_ID
        sync: false
      - key: WHATSAPP_BUSINESS_ACCOUNT_ID
        sync: false
      - key: WHATSAPP_APP_SECRET
        sync: false
      - key: WHATSAPP_API_VERSION
        value: v20.0
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_MODEL
        value: gpt-4.1-mini

  - type: worker
    name: thm-connectx-worker
    runtime: node
    plan: starter
    buildCommand: npm install && npm run build -w server
    startCommand: npm run worker -w server
    envVars:
      - key: NODE_ENV
        value: production
      - key: QUEUE_MODE
        value: worker
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: REDIS_URL
        sync: false
      - key: WHATSAPP_ACCESS_TOKEN
        sync: false
      - key: WHATSAPP_PHONE_NUMBER_ID
        sync: false
      - key: WHATSAPP_API_VERSION
        value: v20.0

  - type: worker
    name: thm-connectx-inbound-worker
    runtime: node
    plan: starter
    buildCommand: npm install && npm run build -w server
    startCommand: npm run inbound-worker
    envVars:
      - key: NODE_ENV
        value: production
      - key: QUEUE_MODE
        value: worker
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: REDIS_URL
        sync: false
      - key: WHATSAPP_ACCESS_TOKEN
        sync: false
      - key: WHATSAPP_PHONE_NUMBER_ID
        sync: false
      - key: WHATSAPP_API_VERSION
        value: v20.0
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_MODEL
        value: gpt-4.1-mini

  - type: web
    name: thm-connectx-panel
    runtime: static
    buildCommand: npm install && npm run build -w client
    staticPublishPath: client/dist
    envVars:
      - key: VITE_API_URL
        sync: false
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
